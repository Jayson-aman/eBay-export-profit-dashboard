# Streamlit テーマ（ui_modern.py のグラデと整合）
# https://docs.streamlit.io/library/advanced-features/theming

# 同一LANのスマホ等からアクセス可（外部インターネットは start_external_access.sh のトンネル推奨）
[server]
address = "0.0.0.0"
port = 8501
headless = true

[theme]
base = "light"
primaryColor = "#4f46e5"
backgroundColor = "#f8fafc"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
font = "sans serif"
linkColor = "#6366f1"
# ワイドレイアウトは dashboard.py の set_page_config(layout="wide") で指定
